                                                                        </span>
                                                                    ` : '-'}
                                                                </td>
                                                            `;
                                                        }).join('')}
                                                        <td class="text-end">
                                                            ${descTotal > 0 ? `<strong class="text-success">${this.formatCurrency(descTotal)}</strong>` : '-'}
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('') : `
                                                <tr class="detail-row">
                                                    <td style="padding-left: 30px;" colspan="${months.length + 2}" class="text-muted text-center">
                                                        No inflow transactions found
                                                    </td>
                                                </tr>
                                            `}

                                            <!-- Outflows Header Row -->
                                            <tr class="table-danger">
                                                <td><strong><i class="bi bi-arrow-up-circle"></i> Outflows</strong></td>
                                                ${rowData.outflows?.map(val => `
                                                    <td class="text-end"><strong>${this.formatCurrency(val)}</strong></td>
                                                `).join('')}
                                                <td class="text-end"><strong>${this.formatCurrency(totalOutflows)}</strong></td>
                                            </tr>

                                            <!-- Outflow Detail Rows -->
                                            ${allOutflowDescriptions.length > 0 ? allOutflowDescriptions.map(desc => {
                                                let descTotal = 0;
                                                months.forEach(month => {
                                                    const items = filteredMonthlyData[month]?.outflow_items || [];
                                                    const item = items.find(i => (i.description || 'Supplier Payment') === desc);
                                                    if (item) descTotal += item.amount;
                                                });
                                                return `
                                                    <tr class="detail-row">
                                                        <td style="padding-left: 30px;">
                                                            <span class="text-muted">${desc}</span>
                                                        </td>
                                                        ${months.map(month => {
                                                            const items = filteredMonthlyData[month]?.outflow_items || [];
                                                            const item = items.find(i => (i.description || 'Supplier Payment') === desc);
                                                            const amount = item ? item.amount : 0;
                                                            const status = item ? item.status : '';
                                                            const supplier = item ? item.supplier : '';
                                                            return `
                                                                <td class="text-end">
                                                                    ${amount > 0 ? `
                                                                        <span class="text-danger">${this.formatCurrency(amount)}</span>
                                                                        <br>
                                                                        <small class="text-muted">${supplier}</small>
                                                                        <br>
                                                                        <span class="badge ${status === 'Paid' ? 'bg-success' : status === 'Pending' ? 'bg-warning' : 'bg-danger'}">
                                                                            ${status || 'Pending'}
                                                                        </span>
                                                                    ` : '-'}
                                                                </td>
                                                            `;
                                                        }).join('')}
                                                        <td class="text-end">
                                                            ${descTotal > 0 ? `<strong class="text-danger">${this.formatCurrency(descTotal)}</strong>` : '-'}
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('') : `
                                                <tr class="detail-row">
                                                    <td style="padding-left: 30px;" colspan="${months.length + 2}" class="text-muted text-center">
                                                        No outflow transactions found
                                                    </td>
                                                </tr>
                                            `}

                                            <!-- Net Row -->
                                            <tr class="table-info">
                                                <td><strong><i class="bi bi-calculator"></i> Net</strong></td>
                                                ${rowData.net?.map(val => `
                                                    <td class="text-end ${val >= 0 ? 'text-success' : 'text-danger'}">
                                                        <strong>${this.formatCurrency(val)}</strong>
                                                    </td>
                                                `).join('')}
                                                <td class="text-end ${totalNet >= 0 ? 'text-success' : 'text-danger'}">
                                                    <strong>${this.formatCurrency(totalNet)}</strong>
                                                </td>
                                            </tr>

                                            <!-- Closing Balance Row -->
                                            <tr class="table-secondary">
                                                <td><strong>Closing Balance</strong></td>
                                                ${rowData.closing_balances?.map(val => `
                                                    <td class="text-end">${this.formatCurrency(val)}</td>
                                                `).join('')}
                                                <td class="text-end"><strong>${this.formatCurrency(data.closing_balance)}</strong></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <!-- No Data Message -->
                                ${totalInflows === 0 && totalOutflows === 0 ? `
                                <div class="alert alert-warning mt-3">
                                    <i class="bi bi-exclamation-triangle"></i>
                                    <strong>No payments found in this date range</strong>
                                    <ul class="mb-0 mt-2">
                                        <li>Make sure you have added supplier payments and customer payments</li>
                                        <li>Ensure payments have a <strong>Due Date</strong> or <strong>Invoice Date</strong> set</li>
                                        <li>Try expanding the date range</li>
                                    </ul>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = html;
            }

            setStatusFilter(status) {
                this.currentStatusFilter = status;
                const startDate = document.getElementById('startDate')?.value;
                const endDate = document.getElementById('endDate')?.value;
                const openingBalance = document.getElementById('openingBalance')?.value || 0;

                if (startDate && endDate) {
                    const loading = document.getElementById('loadingOverlay');
                    loading.classList.add('active');

                    $.ajax({
                        url: `/api/reports/cashflow?start_date=${startDate}&end_date=${endDate}&opening_balance=${openingBalance}`,
                        method: 'GET',
                        success: (data) => {
                            loading.classList.remove('active');
                            this.renderCashflowReport(data);
                        },
                        error: (err) => {
                            loading.classList.remove('active');
                            this.showError('Failed to refresh report');
                            console.error('Error:', err);
                        }
                    });
                }
            }

            runCashflowReport() {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                const openingBalance = document.getElementById('openingBalance').value || 0;

                if (!startDate || !endDate) {
                    this.showError('Please select start and end dates');
                    return;
                }

                if (startDate > endDate) {
                    this.showError('Start date cannot be after end date');
                    return;
                }

                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                $.ajax({
                    url: `/api/reports/cashflow?start_date=${startDate}&end_date=${endDate}&opening_balance=${openingBalance}`,
                    method: 'GET',
                    success: (data) => {
                        loading.classList.remove('active');
                        this.renderCashflowReport(data);
                        this.showSuccess(`Cashflow report generated for ${startDate} to ${endDate}`);
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        this.showError('Failed to generate report');
                        console.error('Error:', err);
                    }
                });
            }

            // ============ SUPPLIER PAYMENT REPORT ============
            renderSupplierPaymentReport(data) {
                const container = document.getElementById('contentArea');
                const payments = data.payments || [];
                const suppliers = data.suppliers || [];
                const filters = data.filters || {};

                const totalAmount = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
                const currency = this.currentCompany?.currency || 'GHS';

                let html = `
                    <div class="fade-in">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">
                                    <i class="bi bi-file-earmark-text"></i> Supplier Payment Report
                                </h5>
                            </div>
                            <div class="card-body">
                                <!-- Filter Section -->
                                <div class="report-filters">
                                    <div class="row g-3">
                                        <div class="col-md-3">
                                            <label class="form-label">Supplier</label>
                                            <select class="form-select" id="reportSupplierFilter">
                                                <option value="all">All Suppliers</option>
                                                ${suppliers.map(s => `
                                                    <option value="${s.id}" ${filters.supplier_id == s.id ? 'selected' : ''}>
                                                        ${s.name}
                                                    </option>
                                                `).join('')}
                                            </select>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">Status</label>
                                            <select class="form-select" id="reportStatusFilter">
                                                <option value="all" ${filters.status === 'all' || !filters.status ? 'selected' : ''}>All Status</option>
                                                <option value="Paid" ${filters.status === 'Paid' ? 'selected' : ''}>Paid</option>
                                                <option value="Pending" ${filters.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                                <option value="Overdue" ${filters.status === 'Overdue' ? 'selected' : ''}>Overdue</option>
                                            </select>
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">Start Date</label>
                                            <input type="date" class="form-control" id="reportStartDate" value="${filters.start_date || ''}">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">End Date</label>
                                            <input type="date" class="form-control" id="reportEndDate" value="${filters.end_date || ''}">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">&nbsp;</label>
                                            <button class="btn btn-primary w-100" onclick="app.runSupplierPaymentReport()">
                                                <i class="bi bi-play-fill"></i> Apply Filters
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Summary Cards -->
                                <div class="row g-3 mb-4">
                                    <div class="col-md-3">
                                        <div class="summary-card bg-info">
                                            <h6>Total Payments</h6>
                                            <h4>${payments.length}</h4>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="summary-card bg-success">
                                            <h6>Total Amount</h6>
                                            <h4>${this.formatCurrency(totalAmount)}</h4>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="summary-card bg-warning">
                                            <h6>Paid</h6>
                                            <h4>${payments.filter(p => p.status === 'Paid').length}</h4>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="summary-card bg-danger">
                                            <h6>Pending/Overdue</h6>
                                            <h4>${payments.filter(p => p.status !== 'Paid').length}</h4>
                                        </div>
                                    </div>
                                </div>

                                <!-- Currency Header -->
                                <div class="currency-header">
                                    <i class="bi bi-currency-dollar"></i> Currency: ${currency}
                                </div>

                                <!-- Payments Table -->
                                <div class="table-responsive">
                                    <table class="table table-hover table-bordered">
                                        <thead class="table-dark">
                                            <tr>
                                                <th>#</th>
                                                <th>Supplier</th>
                                                <th>Description</th>
                                                <th>Invoice Ref</th>
                                                <th class="text-end">Amount</th>
                                                <th>Type</th>
                                                <th>Due Date</th>
                                                <th>Invoice Date</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${payments.length === 0 ? `
                                                <tr>
                                                    <td colspan="9" class="text-center text-muted py-4">
                                                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                        No supplier payments found matching the filters
                                                    </td>
                                                </tr>
                                            ` : payments.map((p, index) => `
                                                <tr>
                                                    <td>${index + 1}</td>
                                                    <td><strong>${p.supplier_name}</strong></td>
                                                    <td>${p.payment_description || '-'}</td>
                                                    <td>${p.invoice_ref || '-'}</td>
                                                    <td class="text-end"><strong>${this.formatCurrency(p.amount)}</strong></td>
                                                    <td>${p.type || '-'}</td>
                                                    <td>${p.due_date || '-'}</td>
                                                    <td>${p.invoice_date || '-'}</td>
                                                    <td>${this.getStatusBadge(p.status)}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                        ${payments.length > 0 ? `
                                        <tfoot class="table-secondary">
                                            <tr>
                                                <td colspan="4" class="text-end"><strong>TOTAL</strong></td>
                                                <td class="text-end"><strong>${this.formatCurrency(totalAmount)}</strong></td>
                                                <td colspan="4"></td>
                                            </tr>
                                        </tfoot>
                                        ` : ''}
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = html;
            }

            runSupplierPaymentReport() {
                const supplierId = document.getElementById('reportSupplierFilter').value;
                const status = document.getElementById('reportStatusFilter').value;
                const startDate = document.getElementById('reportStartDate').value;
                const endDate = document.getElementById('reportEndDate').value;

                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                let url = `/api/reports/supplier-payments?supplier_id=${supplierId}&status=${status}`;
                if (startDate) url += `&start_date=${startDate}`;
                if (endDate) url += `&end_date=${endDate}`;

                $.ajax({
                    url: url,
                    method: 'GET',
                    success: (data) => {
                        loading.classList.remove('active');
                        this.renderSupplierPaymentReport(data);
                        this.showSuccess('Report updated successfully');
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        this.showError('Failed to generate report');
                        console.error('Error:', err);
                    }
                });
            }

            // ============ COMPANY MANAGEMENT METHODS ============
            showAddCompanyForm() {
                const title = document.getElementById('modalTitle');
                const body = document.getElementById('modalBody');

                title.textContent = 'Add New Company';
                body.innerHTML = this.getCompanyFormHTML();
                this.modalInstance.show();
            }

            editCompany(companyId) {
                const title = document.getElementById('modalTitle');
                const body = document.getElementById('modalBody');

                title.textContent = 'Edit Company';

                $.ajax({
                    url: `/api/companies/${companyId}`,
                    method: 'GET',
                    success: (data) => {
                        body.innerHTML = this.getCompanyFormHTML(data);
                        this.modalInstance.show();

                        const form = document.getElementById('companyForm');
                        form.dataset.id = companyId;
                        form.dataset.action = 'update';
                    },
                    error: () => {
                        this.showError('Failed to load company data');
                    }
                });
            }

            getCompanyFormHTML(company = null) {
                const c = company || {};
                return `
                    <form id="companyForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Company Name *</label>
                                    <input type="text" class="form-control" name="name" required
                                           value="${c.name || ''}" placeholder="Enter company name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Currency *</label>
                                    <select class="form-select" name="currency" required>
                                        <option value="GHS" ${c.currency === 'GHS' ? 'selected' : ''}>GHS - Ghana Cedi</option>
                                        <option value="USD" ${c.currency === 'USD' ? 'selected' : ''}>USD - US Dollar</option>
                                        <option value="EUR" ${c.currency === 'EUR' ? 'selected' : ''}>EUR - Euro</option>
                                        <option value="GBP" ${c.currency === 'GBP' ? 'selected' : ''}>GBP - British Pound</option>
                                        <option value="NGN" ${c.currency === 'NGN' ? 'selected' : ''}>NGN - Nigerian Naira</option>
                                        <option value="KES" ${c.currency === 'KES' ? 'selected' : ''}>KES - Kenyan Shilling</option>
                                        <option value="ZAR" ${c.currency === 'ZAR' ? 'selected' : ''}>ZAR - South African Rand</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" name="address" rows="2" placeholder="Enter company address">${c.address || ''}</textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Telephone</label>
                                    <input type="text" class="form-control" name="telephone" value="${c.telephone || ''}" placeholder="Enter telephone number">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Bank Name</label>
                                    <input type="text" class="form-control" name="bank_name" value="${c.bank_name || ''}" placeholder="Enter bank name">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Account Number</label>
                                    <input type="text" class="form-control" name="account_number" value="${c.account_number || ''}" placeholder="Enter account number">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Account Name</label>
                                    <input type="text" class="form-control" name="account_name" value="${c.account_name || ''}" placeholder="Enter account name">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">SWIFT Code</label>
                                    <input type="text" class="form-control" name="swift_code" value="${c.swift_code || ''}" placeholder="Enter SWIFT code">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Bank Address</label>
                                    <input type="text" class="form-control" name="bank_address" value="${c.bank_address || ''}" placeholder="Enter bank address">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="is_active" id="isActive"
                                   ${c.is_active ? 'checked' : ''}>
                            <label class="form-check-label" for="isActive">
                                Activate this company (this will deactivate all other companies)
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Company</button>
                    </form>
                `;
            }

            deleteCompany(companyId) {
                if (!confirm('Are you sure you want to delete this company?')) return;

                $.ajax({
                    url: `/api/companies/${companyId}`,
                    method: 'DELETE',
                    success: (response) => {
                        this.showCompanyManagement();
                        this.showSuccess(response.message);
                    },
                    error: (err) => {
                        const errorMsg = err.responseJSON?.error || 'Failed to delete company';
                        this.showError(errorMsg);
                    }
                });
            }

            activateCompany(companyId) {
                if (!confirm('Are you sure you want to activate this company? This will deactivate all other companies.')) return;

                $.ajax({
                    url: `/api/companies/${companyId}`,
                    method: 'PUT',
                    data: JSON.stringify({ is_active: true }),
                    contentType: 'application/json',
                    success: () => {
                        this.showCompanyManagement();
                        this.loadCompanyInfo();
                        this.showSuccess('Company activated successfully');
                    },
                    error: () => {
                        this.showError('Failed to activate company');
                    }
                });
            }

            // ============ COMPANY SWITCH METHODS ============
            showCompanySwitch() {
                const body = document.getElementById('companyModalBody');
                body.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
                this.companyModalInstance.show();

                $.ajax({
                    url: '/api/companies',
                    method: 'GET',
                    success: (data) => {
                        let html = '<p>Select a company to switch to:</p><div class="list-group">';
                        data.forEach(company => {
                            const isActive = company.is_active ? 'active' : '';
                            const badge = company.is_active ?
                                '<span class="badge bg-success float-end">Active</span>' :
                                '<span class="badge bg-secondary float-end">Inactive</span>';
                            html += `
                                <button class="list-group-item list-group-item-action ${isActive}"
                                        onclick="app.switchCompany(${company.id})">
                                    <h6 class="mb-1">${company.name}</h6>
                                    <small>${company.currency}</small>
                                    ${badge}
                                </button>
                            `;
                        });
                        html += '</div>';
                        body.innerHTML = html;
                    }
                });
            }

            switchCompany(companyId) {
                $.ajax({
                    url: `/api/companies/${companyId}`,
                    method: 'PUT',
                    data: JSON.stringify({ is_active: true }),
                    contentType: 'application/json',
                    success: () => {
                        this.companyModalInstance.hide();
                        this.loadCompanyInfo();
                        this.loadPage(this.currentPage);
                        this.showSuccess('Company switched successfully');
                    },
                    error: () => {
                        this.showError('Failed to switch company');
                    }
                });
            }

            // ============ IMPORT/EXPORT METHODS ============
            importData(file) {
                const formData = new FormData();
                formData.append('file', file);

                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                $.ajax({
                    url: `/api/import/${this.currentPage}`,
                    method: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: () => {
                        loading.classList.remove('active');
                        this.loadPage(this.currentPage);
                        this.showSuccess('Data imported successfully');
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        this.showError('Failed to import data');
                        console.error('Error:', err);
                    }
                });
            }

            exportData() {
                window.location.href = `/api/export/${this.currentPage}`;
            }

            downloadTemplate() {
                window.location.href = `/api/download-template/${this.currentPage}`;
            }

            // ============ UTILITY METHODS ============
            showSuccess(message) {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert alert-success alert-dismissible fade show position-fixed top-0 end-0 m-3';
                alertDiv.style.zIndex = '9999';
                alertDiv.style.maxWidth = '400px';
                alertDiv.innerHTML = `
                    <strong>✅ Success!</strong> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                document.body.appendChild(alertDiv);
                setTimeout(() => {
                    alertDiv.remove();
                }, 5000);
            }

            showError(message) {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert alert-danger alert-dismissible fade show position-fixed top-0 end-0 m-3';
                alertDiv.style.zIndex = '9999';
                alertDiv.style.maxWidth = '400px';
                alertDiv.innerHTML = `
                    <strong>❌ Error!</strong> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                document.body.appendChild(alertDiv);
                setTimeout(() => {
                    alertDiv.remove();
                }, 5000);
            }
        }

        // Initialize app
        const app = new PaymentSystem();

        // Event delegation for form submissions
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'entityForm') {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                const data = {};
                formData.forEach((value, key) => {
                    if (key === 'amount' && value) {
                        data[key] = parseFloat(value.replace(/,/g, ''));
                    } else if (value) {
                        data[key] = value;
                    }
                });

                const isUpdate = form.dataset.action === 'update';
                const id = form.dataset.id || '';
                const page = app.currentPage;
                const url = isUpdate ? `/api/${page}/${id}` : `/api/${page}`;
                const method = isUpdate ? 'PUT' : 'POST';

                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                $.ajax({
                    url: url,
                    method: method,
                    data: JSON.stringify(data),
                    contentType: 'application/json',
                    success: () => {
                        loading.classList.remove('active');
                        app.modalInstance.hide();
                        app.loadPage(page);
                        app.showSuccess(isUpdate ? 'Updated successfully' : 'Added successfully');
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        app.showError('Failed to save data');
                        console.error('Error:', err);
                    }
                });
            }

            // Handle company form
            if (e.target.id === 'companyForm') {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                const data = {};
                formData.forEach((value, key) => {
                    if (key === 'is_active') {
                        data[key] = value === 'on';
                    } else if (value) {
                        data[key] = value;
                    }
                });

                const isUpdate = form.dataset.action === 'update';
                const id = form.dataset.id || '';
                const url = isUpdate ? `/api/companies/${id}` : '/api/companies';
                const method = isUpdate ? 'PUT' : 'POST';

                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                $.ajax({
                    url: url,
                    method: method,
                    data: JSON.stringify(data),
                    contentType: 'application/json',
                    success: (response) => {
                        loading.classList.remove('active');
                        app.modalInstance.hide();
                        app.showCompanyManagement();
                        app.loadCompanyInfo();
                        app.showSuccess(response.message || (isUpdate ? 'Company updated successfully' : 'Company created successfully'));
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        const errorMsg = err.responseJSON?.error || 'Failed to save company';
                        app.showError(errorMsg);
                        console.error('Error:', err);
                    }
                });
            }
        });

        // Handle Enter key for report filters
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.activeElement.id === 'startDate' ||
                    document.activeElement.id === 'endDate' ||
                    document.activeElement.id === 'openingBalance') {
                    app.runCashflowReport();
                }
                if (document.activeElement.id === 'reportStartDate' ||
                    document.activeElement.id === 'reportEndDate' ||
                    document.activeElement.id === 'reportSupplierFilter' ||
                    document.activeElement.id === 'reportStatusFilter') {
                    app.runSupplierPaymentReport();
                }
            }
        });
    </script>
</body>
</html>
